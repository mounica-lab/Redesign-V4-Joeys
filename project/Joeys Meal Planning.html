<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Joey's, Meal planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="recipe.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="mymeals.jsx"></script>
<script type="text/babel" src="hub.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "startRoute": "landing",
  "accent": "sage",
  "density": "comfortable",
  "householdReady": true
}/*EDITMODE-END*/;

function Tweaks({ open, tweaks, setTweaks, route, setRoute, signedIn, setSignedIn, setHouseholdData }) {
  if (!open) return null;
  const goto = (r) => {
    if (r === 'myMeals' || r === 'onboarding') { setSignedIn(true); setHouseholdData(DEFAULT_HOUSEHOLD); }
    setRoute(r);
  };
  return (
    <div className="tweaks-panel">
      <h4>Tweaks</h4>
      <div className="tweak-row">
        <span>Jump to</span>
        <select className="seg" style={{ border: '1px solid var(--line-2)', padding: '4px 8px', borderRadius: 6, fontSize: 12, fontFamily: 'inherit' }} value={route} onChange={e => goto(e.target.value)}>
          <option value="landing">1 · Landing</option>
          <option value="options">2 · Recipe options</option>
          <option value="recipe">3 · Recipe detail</option>
          <option value="signIn">4 · Sign in</option>
          <option value="onboarding">5 · Onboarding</option>
          <option value="reviewPlan">6 · Review plan</option>
          <option value="myMeals">7 · My meals</option>
        </select>
      </div>
      <div className="tweak-row">
        <span>Accent</span>
        <div className="seg">
          {['sage', 'coral', 'butter'].map(c => (
            <button key={c} className={tweaks.accent === c ? 'on' : ''} onClick={() => setTweaks({ ...tweaks, accent: c })}>{c}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span>Auth state</span>
        <div className="seg">
          <button className={!signedIn ? 'on' : ''} onClick={() => { setSignedIn(false); setRoute('landing'); }}>Anon</button>
          <button className={signedIn ? 'on' : ''} onClick={() => { setSignedIn(true); setHouseholdData(DEFAULT_HOUSEHOLD); setRoute('landing'); }}>Signed in</button>
        </div>
      </div>
      <div className="tweak-row">
        <span>Household setup</span>
        <div className="seg">
          <button className={tweaks.householdReady ? '' : 'on'} onClick={() => { setTweaks({ ...tweaks, householdReady: false }); setHouseholdData({ members: [] }); }}>Empty</button>
          <button className={tweaks.householdReady ? 'on' : ''} onClick={() => { setTweaks({ ...tweaks, householdReady: true }); setHouseholdData(DEFAULT_HOUSEHOLD); }}>Ready</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [route, setRouteRaw] = React.useState(() => localStorage.getItem('joeys:route') || TWEAKS.startRoute);
  const [signedIn, setSignedIn] = React.useState(() => localStorage.getItem('joeys:signed') === '1');
  const [household, setHousehold] = React.useState(() => {
    const raw = localStorage.getItem('joeys:household');
    return raw ? JSON.parse(raw) : DEFAULT_HOUSEHOLD;
  });
  const [selectedRecipe, setSelectedRecipe] = React.useState(RECIPES[0]);
  const [queryState, setQueryState] = React.useState(null);
  const [pendingPlan, setPendingPlan] = React.useState([]);
  const [plan, setPlan] = React.useState(DEFAULT_PLAN());
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  const setRoute = (r) => { setRouteRaw(r); localStorage.setItem('joeys:route', r); window.scrollTo(0, 0); };
  React.useEffect(() => { localStorage.setItem('joeys:signed', signedIn ? '1' : '0'); }, [signedIn]);
  React.useEffect(() => { localStorage.setItem('joeys:household', JSON.stringify(household)); }, [household]);

  // Apply accent via CSS var
  React.useEffect(() => {
    const root = document.documentElement;
    const map = {
      sage: 'oklch(0.55 0.13 165)',
      coral: 'oklch(0.62 0.18 20)',
      butter: 'oklch(0.65 0.14 80)',
    };
    root.style.setProperty('--sage', map[tweaks.accent] || map.sage);
  }, [tweaks.accent]);

  // Edit mode protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  let page;
  if (route === 'landing') page = <LandingPage setRoute={setRoute} signedIn={signedIn} setSignedIn={setSignedIn} setQueryState={setQueryState} householdData={household} setHouseholdData={setHousehold} setPendingPlan={setPendingPlan} />;
  else if (route === 'options') page = <RecipeOptionsPage queryState={queryState} setRoute={setRoute} setSelectedRecipe={setSelectedRecipe} />;
  else if (route === 'recipe') page = <RecipePage recipe={selectedRecipe} setRoute={setRoute} signedIn={signedIn} />;
  else if (route === 'signIn') page = <SignInPage setRoute={setRoute} setSignedIn={setSignedIn} setHouseholdData={setHousehold} />;
  else if (route === 'onboarding') page = <OnboardingPage setRoute={setRoute} setHouseholdData={setHousehold} setSignedIn={setSignedIn} />;
  else if (route === 'reviewPlan') page = <ReviewPlanPage pendingPlan={pendingPlan} household={household} setRoute={setRoute} setSelectedRecipe={setSelectedRecipe} setSignedIn={setSignedIn} plan={plan} setPlan={setPlan} />;
  else if (route === 'myMeals') page = <MyMealsPage household={household} setRoute={setRoute} setSelectedRecipe={setSelectedRecipe} setSignedIn={setSignedIn} plan={plan} setPlan={setPlan} />;
  else page = <LandingPage setRoute={setRoute} signedIn={signedIn} setSignedIn={setSignedIn} setQueryState={setQueryState} householdData={household} setHouseholdData={setHousehold} setPendingPlan={setPendingPlan} />;

  return (
    <>
      <div data-screen-label={route}>{page}</div>
      <Tweaks open={tweaksOpen} tweaks={tweaks} setTweaks={setTweaks}
        route={route} setRoute={setRoute} signedIn={signedIn} setSignedIn={setSignedIn}
        setHouseholdData={setHousehold} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
